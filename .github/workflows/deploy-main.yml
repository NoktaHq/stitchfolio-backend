# Deploy Stitchfolio backend (prod) to VPC. Traefik at infra level does TLS and routes /api/sf/v1.

name: Deploy Main

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SSH_HOST: "31.97.202.6"
  SSH_USER: "root"
  DEPLOY_PATH: "/stitchfolio/backend-prod"
  ENV_FILE: "/root/stitchfolio_env/prod.env"
  CONFIG_FILE: "prod.yaml"
  COMPOSE_PROJECT: "stitchfolio-prod"
  BRANCH: "main"
  TRAEFIK_ROUTER_NAME: "stitchfolio-prod"
  TRAEFIK_RULE: "PathPrefix(`/api/sf/v1`)"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:$PATH"
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker not found."
              exit 1
            fi
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            if [ ! -d "$DEPLOY_PATH" ]; then
              mkdir -p /stitchfolio
              git clone "$REPO_URL" "$DEPLOY_PATH"
              cd "$DEPLOY_PATH"
              git checkout "$BRANCH"
            else
              cd "$DEPLOY_PATH"
            fi

            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            echo "Writing .env for compose..."
            echo "ENV_FILE_PATH=${{ env.ENV_FILE }}" > .env
            echo "CONFIG_FILE=${{ env.CONFIG_FILE }}" >> .env
            echo "COMPOSE_PROJECT=${{ env.COMPOSE_PROJECT }}" >> .env
            echo "TRAEFIK_ROUTER_NAME=${{ env.TRAEFIK_ROUTER_NAME }}" >> .env
            echo "TRAEFIK_RULE=${{ env.TRAEFIK_RULE }}" >> .env

            echo "Building and starting backend (Traefik routes /api/sf/v1)..."
            docker compose -p ${{ env.COMPOSE_PROJECT }} build --no-cache
            docker compose -p ${{ env.COMPOSE_PROJECT }} up -d

            echo "Production deployment complete."
