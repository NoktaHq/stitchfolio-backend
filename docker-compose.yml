# Stitchfolio backend only. Traefik (run from infra repo) does TLS and path routing.
# Set ENV_FILE_PATH, CONFIG_FILE, COMPOSE_PROJECT, TRAEFIK_ROUTER_NAME, TRAEFIK_RULE via .env (written by CI).
# Join network noktahq_web so Traefik can route to this service.

services:
  backend:
    build: .
    env_file: ${ENV_FILE_PATH}
    command: ["./app", "--configFile", "./config/${CONFIG_FILE}"]
    restart: unless-stopped
    networks:
      - noktahq_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=${TRAEFIK_RULE}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.service=${TRAEFIK_ROUTER_NAME}"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=9000"

networks:
  noktahq_web:
    external: true
